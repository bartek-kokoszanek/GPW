name: Aktualizacja cen docelowych (TradingView)

on:
  schedule:
    # Codziennie o 6:00 UTC (8:00 w Polsce)
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # pozwala też odpalić ręcznie z zakładki Actions

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Uruchom scraper
        run: python scripts/update_targets.py

      - name: Commit i push zmian
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-update: ceny docelowe TradingView $(date -u +'%Y-%m-%d')"
          git push
